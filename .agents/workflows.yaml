# Workflow Registry — Single Source of Truth
# Defines the three canonical workflows and their step sequences.

workflows:
  IMPLEMENT:
    description: Full implementation workflow with spec review, code, test, and QA.
    requires_worktree: true
    slash_command:
      name: implement
      description: 'Start IMPLEMENT workflow for a ready spec.'
      argument_hint: '[spec-slug]'
      allowed_tools: [Read, Glob, Grep, Bash, Write, Edit, Agent]
    steps:
      - name: reviewer-pre
        agent: reviewer
        mode: pre-implementation
        signal_on_success: 'reviewer: APPROVED'
        signal_on_failure: 'reviewer: BLOCKED'
      - name: coder-backend
        agent: coder-backend
        parallel_with: [coder-frontend]
        signal_on_success: 'coder-backend: DONE'
      - name: coder-frontend
        agent: coder-frontend
        parallel_with: [coder-backend]
        signal_on_success: 'coder-frontend: DONE'
      - name: tester
        agent: tester
        after: [coder-backend, coder-frontend]
        signal_on_success: 'tester: DONE'
      - name: reviewer-post
        agent: reviewer
        mode: post-change
        after: [tester]
        signal_on_success: 'reviewer: APPROVED'
        signal_on_failure: 'reviewer: FEEDBACK → [agent]'
      - name: qa-analyst
        agent: qa-analyst
        after: [reviewer-post]
        signal_on_success: 'qa-analyst: GREEN'
        signal_on_failure: 'qa-analyst: FEEDBACK → [agent]'
        retry:
          max_rounds: 2
          on_failure: 're-spawn target agent → reviewer-post → qa-analyst'
          escalation: 'lead asks user'

  SPEC:
    description: Planning workflow — refine a spec through progressive stages via Q&A.
    requires_worktree: false
    skill: spec-writer
    slash_command:
      name: spec
      description: 'Start SPEC workflow to create or refine a spec.'
      argument_hint: '[spec-slug]'
      allowed_tools: [Read, Glob, Grep, Write, Edit, Agent]
    steps:
      - name: spec-writer
        skill: spec-writer
        signal_on_success: 'spec-writer: DONE'
      - name: reviewer
        agent: reviewer
        mode: pre-implementation
        after: [spec-writer]
        signal_on_success: 'reviewer: APPROVED'
      - name: architect
        agent: architect
        after: [reviewer]
        condition: 'has_architectural_questions'
        signal_on_success: 'architect: DONE'

  AD_HOC:
    description: Quick fix workflow — debug, diagnose, apply small fixes.
    requires_worktree: true
    slash_command:
      name: fix
      description: 'Start AD_HOC workflow for quick fixes and bugs.'
      argument_hint: '[description]'
      allowed_tools: [Read, Glob, Grep, Bash, Write, Edit, Agent]
    steps:
      - name: support
        agent: support
        signal_on_success: 'support: DONE'
        signal_on_failure: 'support: NEEDS_ARCHITECT'
      - name: reviewer-post
        agent: reviewer
        mode: post-change
        after: [support]
        signal_on_success: 'reviewer: APPROVED'
        signal_on_failure: 'reviewer: FEEDBACK → [agent]'
      - name: qa-analyst
        agent: qa-analyst
        after: [reviewer-post]
        signal_on_success: 'qa-analyst: GREEN'
        signal_on_failure: 'qa-analyst: FEEDBACK → [agent]'
        retry:
          max_rounds: 2
          on_failure: 're-spawn target agent → reviewer-post → qa-analyst'
          escalation: 'lead asks user'
