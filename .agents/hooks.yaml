# Hooks Registry — Single Source of Truth
# Generated into .claude/settings.json hook entries.

hooks:
  worktree-guard:
    trigger: PreToolUse
    tool_pattern: 'Write|Edit'
    command: 'bash .agents/hooks/worktree-guard.sh'
    description: >
      Blocks writes to main checkout on main branch.
      Allowlist: .agents/*, .claude/*, tmp/*
    template: null

  spec-ready-gate:
    trigger: PostToolUse
    tool_pattern: 'Write|Edit'
    command: 'bash .agents/hooks/spec-ready-gate.sh'
    description: >
      When a spec file is set to status: ready, automatically runs
      verify-spec-ready.sh and reports failures.
    template: null
