# Agent NX Commands Registry

commands:
  sync-all:
    generator: '@tools:sync-all'
    description: 'Regenerate all derived files from registry'
    args: {}

  sync-agents:
    generator: '@tools:sync-agents'
    description: 'Regenerate .claude/agents/*.md from registry'
    args: {}

  sync-skills:
    generator: '@tools:sync-skills'
    description: 'Regenerate .claude/skills/*/SKILL.md from registry'
    args: {}

  sync-settings:
    generator: '@tools:sync-settings'
    description: 'Regenerate .claude/settings.json'
    args: {}

  create-spec:
    generator: '@tools:create-spec'
    description: 'Create a new spec from template'
    args:
      slug: { type: string, required: true }
      goal: { type: string, required: true }

  update-spec:
    generator: '@tools:update-spec'
    description: 'Update spec frontmatter'
    args:
      slug: { type: string, required: true }
      status: { type: string, enum: [stub, draft, ready, in-progress, done] }

  start-task:
    generator: '@tools:start-task'
    description: 'Create branch + worktree for task'
    args:
      slug: { type: string, required: true }

  finish-task:
    generator: '@tools:finish-task'
    description: 'Cleanup worktree + update spec'
    args:
      slug: { type: string, required: true }

  abort-task:
    generator: '@tools:abort-task'
    description: 'Cleanup worktree without merge'
    args:
      slug: { type: string, required: true }

  validate-registry:
    generator: '@tools:validate-registry'
    description: 'Check derived files match registry (CI-safe)'
    args: {}
