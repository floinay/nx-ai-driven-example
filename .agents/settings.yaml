# Shared settings — Single Source of Truth
# Generates: .claude/settings.json, .claude/launch.json

permissions:
  allow:
    - Bash
    - Read
    - Edit
    - Write
    - Glob
    - Grep
    - WebSearch
  deny:
    - 'Bash(rm -rf /)'
    - 'Bash(rm -rf /*)'
    - 'Bash(sudo rm -rf *)'

env:
  CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: '1'
  CLAUDE_AUTOCOMPACT_PCT_OVERRIDE: '60'

launch:
  - name: prototype
    runtimeExecutable: npx
    runtimeArgs: ['nx', 'serve', 'prototype']
    port: 4500
